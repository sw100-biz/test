  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4b6b6559-c483-42bc-a0d6-38a84ee89a54\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<script src=\"e9e49a52-ae35-4eff-a59f-4f8049edee0c\"><\u002Fscript>\n<style>\n  /* =============================================================================\n   Wanted Design System — Colors & Typography\n   Tokens are mirrored from the Figma library \"Wanted Design System (Community)\".\n   Naming follows the system convention: color-{global|semantic}-{role}-{variant}.\n   ============================================================================= */\n\n/* ---------- FONTS -------------------------------------------------- */\n/* Pretendard JP — primary UI typeface (KR/JP/EN). Self-hosted via cdn jsDelivr. */\n@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard-jp@v0.0.4/dist/web/static/pretendard-jp.css');\n/* Wanted Sans — display/brand typeface */\n@import url('https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.4/packages/wanted-sans/fonts/webfonts/static/complete/WantedSans.min.css');\n/* Wanted Sans Variable — used for very large display headers */\n@import url('https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.4/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css');\n\n:root {\n  /* ============================================================\n     GLOBAL PALETTE — atomic, role-agnostic. Reference these for tokens.\n     11 hues × 11 steps (50, 100…900, 950) + neutrals.\n     ============================================================ */\n\n  /* Neutral (true grey) */\n  --color-global-neutral-0:   #ffffff;\n  --color-global-neutral-50:  #fafafa;\n  --color-global-neutral-100: #f4f4f5;\n  --color-global-neutral-200: #e4e4e7;\n  --color-global-neutral-300: #d4d4d8;\n  --color-global-neutral-400: #a1a1aa;\n  --color-global-neutral-500: #71717a;\n  --color-global-neutral-600: #52525b;\n  --color-global-neutral-700: #3f3f46;\n  --color-global-neutral-800: #27272a;\n  --color-global-neutral-900: #18181b;\n  --color-global-neutral-950: #09090b;\n\n  /* Cool neutral (slight blue cast) — used as the primary grey scale in product UI */\n  --color-global-coolNeutral-50:  #f7f7f8;\n  --color-global-coolNeutral-100: #f4f4f5;\n  --color-global-coolNeutral-200: #dbdcdf;\n  --color-global-coolNeutral-300: #c2c4c8;\n  --color-global-coolNeutral-400: #aeb0b6;\n  --color-global-coolNeutral-500: #989ba2;\n  --color-global-coolNeutral-600: #70737c;\n  --color-global-coolNeutral-700: #46474c;\n  --color-global-coolNeutral-800: #2e2f33;\n  --color-global-coolNeutral-900: #1b1c1e;\n  --color-global-coolNeutral-950: #0e0f10;\n\n  /* Blue — brand primary */\n  --color-global-blue-50:  #eaf2fe;\n  --color-global-blue-100: #d6e4fd;\n  --color-global-blue-200: #adc8fb;\n  --color-global-blue-300: #84acf9;\n  --color-global-blue-400: #5b91f7;\n  --color-global-blue-500: #3385ff;\n  --color-global-blue-600: #0066ff;     /* primary */\n  --color-global-blue-700: #005eeb;\n  --color-global-blue-800: #0052cc;\n  --color-global-blue-900: #003d99;\n  --color-global-blue-950: #002966;\n\n  /* Red — destructive / error */\n  --color-global-red-50:  #fff0f0;\n  --color-global-red-100: #ffd7d7;\n  --color-global-red-200: #ffb0b0;\n  --color-global-red-300: #ff8989;\n  --color-global-red-400: #ff6b6b;\n  --color-global-red-500: #ff4242;\n  --color-global-red-600: #e61f1f;\n  --color-global-red-700: #c00000;\n  --color-global-red-800: #990000;\n  --color-global-red-900: #660000;\n\n  /* Green — positive / success */\n  --color-global-green-50:  #e6fff0;\n  --color-global-green-100: #b8ffd0;\n  --color-global-green-200: #80ffb0;\n  --color-global-green-300: #40ee85;\n  --color-global-green-400: #00d957;\n  --color-global-green-500: #00bf40;\n  --color-global-green-600: #00a637;\n  --color-global-green-700: #008c2f;\n  --color-global-green-800: #007326;\n  --color-global-green-900: #00591d;\n\n  /* Orange — warning / accent */\n  --color-global-orange-500: #ff9b00;\n  --color-global-orange-600: #f08200;\n  --color-global-orange-700: #d96e00;\n\n  /* Red-Orange — accent (signature accent for \"highlight\" callouts) */\n  --color-global-redOrange-500: #ff6940;\n  --color-global-redOrange-600: #f25c33;\n\n  /* Lime */\n  --color-global-lime-500: #6bc400;\n\n  /* Cyan */\n  --color-global-cyan-500: #0098b2;\n\n  /* Light blue */\n  --color-global-lightBlue-500: #3eb3f7;\n\n  /* Violet (secondary brand accent — used in marketing strokes) */\n  --color-global-violet-500: #9747ff;\n  --color-global-violet-600: #6541f2;\n\n  /* Purple */\n  --color-global-purple-500: #a056ff;\n  --color-global-purple-50:  #f0ecfe;\n\n  /* Pink */\n  --color-global-pink-500: #ff4f87;\n\n  /* ============================================================\n     SEMANTIC TOKENS — light theme (default).\n     These are the only tokens product surfaces should reference.\n     ============================================================ */\n\n  /* — Primary (Wanted brand blue) — */\n  --color-primary-normal:  var(--color-global-blue-600);\n  --color-primary-strong:  var(--color-global-blue-700);\n  --color-primary-heavy:   var(--color-global-blue-800);\n\n  /* — Label (foreground / text) — */\n  --color-label-normal:    rgba(23, 23, 25, 1);       /* near-black */\n  --color-label-strong:    #000000;\n  --color-label-neutral:   rgba(46, 47, 51, 0.88);\n  --color-label-alternative: rgba(55, 56, 60, 0.61);\n  --color-label-assistive: rgba(55, 56, 60, 0.28);\n  --color-label-disable:   rgba(55, 56, 60, 0.16);\n\n  /* — Background — */\n  --color-background-normal-normal:    #ffffff;\n  --color-background-normal-alternative: #f7f7f8;\n  --color-background-elevated-normal:  #ffffff;\n  --color-background-elevated-alternative: #f7f7f8;\n  --color-background-neutral:          rgba(112, 115, 124, 0.05);\n\n  /* — Line / ", \"Pretendard JP\", sans-serif;\n  --font-mono:   \"SF Mono\", \"JetBrains Mono\", \"Cascadia Code\", Menlo, Consolas, monospace;\n\n  /* — Type scale (sizes from Figma typography frame) — */\n  --text-display-1-size: 56px;  --text-display-1-line: 1.20; --text-display-1-spacing: -0.030em; --text-display-1-weight: 700;\n  --text-display-2-size: 36px;  --text-display-2-line: 1.33; --text-display-2-spacing: -0.027em; --text-display-2-weight: 700;\n  --text-title-1-size: 28px;    --text-title-1-line: 1.36; --text-title-1-spacing: -0.024em; --text-title-1-weight: 700;\n  --text-title-2-size: 24px;    --text-title-2-line: 1.33; --text-title-2-spacing: -0.023em; --text-title-2-weight: 700;\n  --text-heading-1-size: 22px;  --text-heading-1-line: 1.36; --text-heading-1-spacing: -0.020em; --text-heading-1-weight: 600;\n  --text-heading-2-size: 20px;  --text-heading-2-line: 1.40; --text-heading-2-spacing: -0.017em; --text-heading-2-weight: 600;\n  --text-headline-1-size: 18px; --text-headline-1-line: 1.44; --text-headline-1-spacing: -0.013em; --text-headline-1-weight: 600;\n  --text-headline-2-size: 17px; --text-headline-2-line: 1.41; --text-headline-2-spacing: -0.011em; --text-headline-2-weight: 600;\n  --text-body-1-size: 16px;     --text-body-1-line: 1.50; --text-body-1-spacing: 0.006em; --text-body-1-weight: 500;\n  --text-body-1r-size: 16px;    --text-body-1r-line: 1.50; --text-body-1r-spacing: 0.006em; --text-body-1r-weight: 400;\n  --text-body-2-size: 15px;     --text-body-2-line: 1.47; --text-body-2-spacing: 0.010em; --text-body-2-weight: 500;\n  --text-label-1-size: 14px;    --text-label-1-line: 1.43; --text-label-1-spacing: 0.014em; --text-label-1-weight: 600;\n  --text-label-2-size: 13px;    --text-label-2-line: 1.38; --text-label-2-spacing: 0.018em; --text-label-2-weight: 600;\n  --text-caption-1-size: 12px;  --text-caption-1-line: 1.33; --text-caption-1-spacing: 0.025em; --text-caption-1-weight: 500;\n  --text-caption-2-size: 11px;  --text-caption-2-line: 1.27; --text-caption-2-spacing: 0.031em; --text-caption-2-weight: 700;\n\n  /* ============================================================\n     RADII\n     ============================================================ */\n  --radius-2:   2px;\n  --radius-4:   4px;\n  --radius-8:   8px;\n  --radius-12: 12px;\n  --radius-16: 16px;\n  --radius-24: 24px;\n  --radius-32: 32px;\n  --radius-full: 9999px;\n\n  /* ============================================================\n     SPACING — 4px base\n     ============================================================ */\n  --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;\n  --space-5: 20px; --space-6: 24px; --space-7: 28px; --space-8: 32px;\n  --space-10: 40px; --space-12: 48px; --space-16: 64px; --space-20: 80px;\n  --space-24: 96px; --space-32: 128px;\n\n  /* ============================================================\n     ELEVATION\n     ============================================================ */\n  --shadow-emphasize: 0 1px 4px 0 rgba(0,0,0,0.08), 0 1px 2px 0 rgba(23,23,23,0.07);\n  --shadow-strong:    0 6px 16px 0 rgba(23,23,23,0.10), 0 2px 4px 0 rgba(0,0,0,0.06);\n  --shadow-heavy:     0 12px 32px 0 rgba(23,23,23,0.12), 0 4px 8px 0 rgba(0,0,0,0.06);\n\n  /* Mobile safe areas (Wanted uses these as design tokens, not just env()) */\n  --safe-status-ios:     44px;\n  --safe-status-android: 24px;\n  --safe-bottom-ios:     34px;\n  --safe-nav-android:    48px;\n\n  /* Grid */\n  --grid-mobile-cols: 4;\n  --grid-mobile-gutter: 16px;\n  --grid-mobile-margin: 20px;\n  --grid-tablet-cols: 8;\n  --grid-tablet-gutter: 24px;\n  --grid-tablet-margin: 32px;\n  --grid-desktop-cols: 12;\n  --grid-desktop-gutter: 24px;\n  --grid-desktop-margin: 80px;\n}\n\n/* ---------- DARK THEME -------------------------------------------- */\n[data-theme=\"dark\"] {\n  --color-label-normal:        rgba(247, 247, 248, 0.96);\n  --color-label-strong:        #ffffff;\n  --color-label-neutral:       rgba(247, 247, 248, 0.88);\n  --color-label-alternative:   rgba(247, 247, 248, 0.61);\n  --color-label-assistive:     rgba(247, 247, 248, 0.28);\n  --color-label-disable:       rgba(247, 247, 248, 0.16);\n\n  --color-background-normal-normal:    #1b1c1e;\n  --color-background-normal-alternative: #131415;\n  --color-background-elevated-normal:  #2e2f33;\n  --color-background-elevated-alternative: #46474c;\n  --color-background-neutral:  rgba(174, 176, 182, 0.07);\n\n  --color-line-normal-normal:  rgba(174, 176, 182, 0.22);\n  --color-line-normal-neutral: rgba(174, 176, 182, 0.14);\n  --color-line-solid-normal:   #46474c;\n\n  --color-primary-normal:      var(--color-global-blue-500);\n  --color-primary-strong:      var(--color-global-blue-400);\n\n  --color-inverse-primary:     #1b1c1e;\n  --color-inverse-background:  #ffffff;\n  --color-inverse-label:       #1b1c1e;\n\n  --color-accent-bg-blue:      rgba(0, 102, 255, 0.16);\n  --color-accent-bg-redOrange: rgba(255, 105, 64, 0.16);\n  --color-accent-bg-violet:    rgba(151, 71, 255, 0.20);\n  --color-accent-bg-green:     rgba(0, 191, 64, 0.18);\n  --color-accent-bg-red:       rgba(255, 66, 66, 0.18);\n}\n\n/* ---------- TYPE UTILITIES ---------------------------------------- */\nhtml, body { font-family: var(--font-sans); color: var(--color-label-normal); background: var(--color-background-normal-normal); }\nbody { font-size: 16px; line-height: 1.5; letter-spacing: 0.006em; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\n\n.t-display-1 { font: var(--text-display-1-weight) var(--text-display-1-size)/var(--text-display-1-line) var(--font-sans); letter-spacing: var(--text-display-1-spacing); }\n.t-display-2 { font: var(--text-display-2-weight) var(--text-display-2-size)/var(--text-display-2-line) var(--font-sans); letter-spacing: var(--text-display-2-spacing); }\n.t-title-1   { font: var(--text-title-1-weight) var(--text-title-1-size)/var(--text-title-1-line) var(--font-sans); letter-spacing: var(--text-title-1-spacing); }\n.t-ti acing); }\n\n/* Semantic tag mappings — sensible defaults for prose */\nh1 { font: var(--text-display-2-weight) var(--text-display-2-size)/var(--text-display-2-line) var(--font-sans); letter-spacing: var(--text-display-2-spacing); }\nh2 { font: var(--text-title-1-weight) var(--text-title-1-size)/var(--text-title-1-line) var(--font-sans); letter-spacing: var(--text-title-1-spacing); }\nh3 { font: var(--text-title-2-weight) var(--text-title-2-size)/var(--text-title-2-line) var(--font-sans); letter-spacing: var(--text-title-2-spacing); }\nh4 { font: var(--text-heading-2-weight) var(--text-heading-2-size)/var(--text-heading-2-line) var(--font-sans); letter-spacing: var(--text-heading-2-spacing); }\np, li, span { letter-spacing: 0.006em; }\ncode, pre, kbd { font-family: var(--font-mono); }\n\n  :root{\n    --accent:#123F2E;\n    --accent-strong: color-mix(in srgb, var(--accent) 78%, #000);\n    --accent-tint: color-mix(in srgb, var(--accent) 8%, #fff);\n    --accent-tint-2: color-mix(in srgb, var(--accent) 15%, #fff);\n    --canvas:#f3f4f6;\n    --row-pad:13px;\n    --line: var(--color-line-normal-normal);\n    --line2: var(--color-line-normal-neutral);\n  }\n  *{box-sizing:border-box;}\n  body{margin:0;font-family:var(--font-sans);background:#d9dbdf;}\n  button{font-family:inherit;cursor:pointer;}\n  a{-webkit-tap-highlight-color:transparent;}\n  input:not([type=checkbox]), select{\n    height:38px;width:100%;border:1px solid var(--color-line-solid-normal);border-radius:8px;\n    padding:0 12px;font-size:14px;color:var(--color-label-normal);background:#fff;outline:none;\n  }\n  select{padding-right:30px;appearance:none;-webkit-appearance:none;}\n  input:not([type=checkbox]):focus, select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint-2);}\n  input::placeholder{color:var(--color-label-assistive);}\n  input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;}\n  table{width:100%;border-collapse:collapse;}\n  th,td{padd
